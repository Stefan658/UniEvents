version: "3.9"

services:
  backend:
    build: ./backend
    container_name: uni_events_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - PORT=5000
      - FLASK_DEBUG=True
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: uni_events_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    image: postgres:16
    container_name: uni_events_db
    restart: always
    environment:
      POSTGRES_DB: uni_events
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: